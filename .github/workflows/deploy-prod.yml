name: Deploy — Prod

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Build & deploy backend (prod)
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Write .env.prod
        run: |
          cat > server/.env.prod <<EOF
          NODE_ENV=prod
          PORT=4000
          MONGODB_URI=${{ secrets.MONGODB_URI_PROD }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          EOF

      - name: Deploy to ECS (prod)
        run: bash server/deploy-ecs.sh prod

  provision-tenants:
    name: Provision tenant databases (prod)
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Write .env.prod
        run: |
          cat > server/.env.prod <<EOF
          NODE_ENV=prod
          PORT=4000
          MONGODB_URI=${{ secrets.MONGODB_URI_PROD }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          EOF

      - name: Re-provision all tenants for prod environment
        run: node server/provision-tenant.js PG_Machine "PG Machine"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI_PROD }}
